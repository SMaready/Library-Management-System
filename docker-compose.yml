services:
    db:
        image: postgres:18-alpine
        container_name: postgres_db
        restart: always
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - "${DB_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgressql/data
        network:
            - pg_network

volumes:
    postgres_data: